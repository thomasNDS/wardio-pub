# Builds the Angular site and deploys it to GitHub Pages.
# One-time: repo Settings › Pages › Source = "GitHub Actions".
name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install --legacy-peer-deps
      - name: Build (base-href for project Pages)
        run: npx ng build --configuration production --base-href /wardio-pub/
      - name: SPA fallback for deep links
        run: cp dist/wardio-pub/browser/index.html dist/wardio-pub/browser/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/wardio-pub/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
